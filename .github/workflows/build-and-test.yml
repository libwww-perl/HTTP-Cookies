---
name: dzil build and test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-job:
    name: Build distribution
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v6.0.3
      - name: install aspell
        run: apt-get install aspell aspell-en
      - name: Run Tests
        env:
          AUTHOR_TESTING: 1
          AUTOMATED_TESTING: 1
          EXTENDED_TESTING: 1
          RELEASE_TESTING: 1
        run: upgrade-perl-helpers && auto-build-and-test-dist
      - uses: actions/upload-artifact@v7
        with:
          name: build_dir
          path: build_dir
  coverage-job:
    name: Coverage
    needs: build-job
    runs-on: ubuntu-latest
    container:
      image: perldocker/perl-tester:5.42
    steps:
      - uses: actions/checkout@v6.0.3 # codecov wants to be inside a Git repository
      - uses: actions/download-artifact@v8.0.1
        with:
          name: build_dir
          path: .
      - name: Install deps and test
        run: cpan-install-dist-deps --with-develop && test-dist
        env:
          CODECOV_TOKEN: ${{secrets.CODECOV_TOKEN}}
  test-linux:
    name: "${{ matrix.perl-version }} on Linux"
    needs: build-job
    runs-on: ubuntu-latest
    container:
      image: "perldocker/perl-tester:${{ matrix.perl-version }}"
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - "5.8"
          - "5.10"
          - "5.12"
          - "5.14"
          - "5.16"
          - "5.18"
          - "5.20"
          - "5.22"
          - "5.24"
          - "5.26"
          - "5.28"
          - "5.30"
          - "5.32"
          - "5.34"
          - "5.36"
          - "5.38"
          - "5.40"
          - "5.42"
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/download-artifact@v8.0.1
        with:
          name: build_dir
          path: .
      - name: Install deps and test
        run: cpan-install-dist-deps && test-dist
  test-macos:
    name: ${{ matrix.perl-version }} on macos-latest
    needs: test-linux
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - "5.8"
          - "5.10"
          - "5.12"
          - "5.14"
          - "5.16"
          - "5.18"
          - "5.20"
          - "5.22"
          - "5.24"
          - "5.26"
          - "5.28"
          - "5.30"
          - "5.32"
          - "5.34"
          - "5.36"
          - "5.38"
          - "5.40"
          - "5.42"
    steps:
      - name: Set Up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}
      - uses: actions/download-artifact@v8.0.1
        with:
          name: build_dir
          path: .
      - name: install deps using cpm
        uses: perl-actions/install-with-cpm@v2.4
        with:
          cpanfile: "cpanfile"
          args: "--with-suggests --with-test"
      - run: prove -lr t
  test-windows:
    name: ${{ matrix.perl-version }} on windows-latest
    needs: test-linux
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        perl-version:
          - "5.14"
          - "5.16"
          - "5.18"
          - "5.20"
          - "5.22"
          - "5.24"
          - "5.26"
          - "5.28"
          - "5.30"
          - "5.32"
    steps:
      - name: Set Up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: ${{ matrix.perl-version }}
          distribution: strawberry # this option only used on Windows
      - uses: actions/download-artifact@v8.0.1
        with:
          name: build_dir
          path: .
      - name: install deps using cpm
        uses: perl-actions/install-with-cpm@v2.4
        with:
          cpanfile: "cpanfile"
          args: "--with-suggests --with-test --with-develop"
      - run: cpanm --testonly -v .
